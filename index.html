<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monthly Meetings</title>
  <meta name="description" content="BoozClub: monthly host and date." />
  <meta name="color-scheme" content="light dark" />
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#0f172a; --muted:#475569;
      --primary:#1e3a8a; --accent:#dc2626; --shadow:0 10px 20px rgba(0,0,0,.08);
      --radius:18px; --ring:rgba(30,64,175,.30);
      --ok:#16a34a; --warn:#eab308; --bad:#dc2626;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0b1220; --card:#0f172a; --text:#e5e7eb; --muted:#94a3b8;
        --primary:#60a5fa; --accent:#ef4444; --shadow:0 12px 26px rgba(0,0,0,.35);
      }
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:
        radial-gradient(1000px 520px at 10% -10%, rgba(30,64,175,.12), transparent 60%),
        radial-gradient(1100px 620px at 120% -20%, rgba(220,38,38,.10), transparent 50%),
        var(--bg);
      color: var(--text);
    }
    .wrap{ max-width: 980px; margin: 0 auto; padding: 28px 18px 46px; }
    header{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    h1{ margin:0; font-size: 28px; letter-spacing:-.02em; }
    .sub{ color: var(--muted); margin-top: 6px; }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 16px;
    }
    @media (min-width: 900px){
      .grid{ grid-template-columns: 1.2fr .8fr; }
    }
    .card{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border:1px solid rgba(148,163,184,.18);
      padding: 16px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 7px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.35);
      background: rgba(148,163,184,.08);
      color: var(--muted);
      font-size: 12px;
      user-select:none;
      white-space:nowrap;
    }
    .pill strong{ color: var(--text); }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 10px 14px;
      border-radius: 12px;
      border:1px solid rgba(148,163,184,.35);
      background: transparent;
      color: var(--text);
      text-decoration:none;
      font-weight: 650;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .btn:hover{ box-shadow: 0 0 0 4px var(--ring); }
    .btn.primary{
      background: rgba(30,64,175,.10);
      border-color: rgba(30,64,175,.35);
      color: var(--text);
    }
    .btn.accent{
      background: rgba(220,38,38,.10);
      border-color: rgba(220,38,38,.35);
      color: var(--text);
    }
    .btn:active{ transform: translateY(1px); }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .spacer{ flex:1 1 auto; }
    .kv{
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .kv .line{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding: 8px 10px;
      border-radius: 14px;
      border:1px solid rgba(148,163,184,.18);
      background: rgba(148,163,184,.06);
    }
    .kv .k{ color: var(--muted); }
    .kv .v{ font-weight: 700; }
    .hero{
      display:flex; flex-direction:column; gap:12px;
    }
    .big{
      font-size: 34px;
      font-weight: 900;
      letter-spacing:-.03em;
      margin: 0;
      line-height: 1.05;
    }
    .big span{ color: var(--primary); }
    .badge{
      display:inline-flex;
      align-items:center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(148,163,184,.25);
      background: rgba(148,163,184,.08);
      color: var(--muted);
      white-space:nowrap;
    }
    .badge.active{ background: rgba(22,163,74,.10); border-color: rgba(22,163,74,.35); color: var(--ok); }
    .badge.soon{ background: rgba(234,179,8,.12); border-color: rgba(234,179,8,.35); color: var(--warn); }
    .badge.past{ background: rgba(148,163,184,.10); border-color: rgba(148,163,184,.25); color: var(--muted); }
    .badge.skipped{ background: rgba(220,38,38,.12); border-color: rgba(220,38,38,.35); color: var(--bad); }
    .badge.cancelled{ background: rgba(220,38,38,.12); border-color: rgba(220,38,38,.35); color: var(--bad); }
    .divider{ height:1px; background: rgba(148,163,184,.25); margin: 12px 0; }
    .muted{ color: var(--muted); }
    footer{
      margin-top: 16px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color: var(--muted);
      font-size: 12px;
      align-items:center;
    }
    .sync{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.35);
      background: rgba(148,163,184,.08);
      color: var(--muted);
      user-select:none;
      white-space:nowrap;
      font-size:12px;
    }
    .dot{
      width:8px; height:8px; border-radius:999px; background: rgba(148,163,184,.6);
      display:inline-block;
    }
    .dot.ok{ background: rgba(22,163,74,.9); }
    .dot.bad{ background: rgba(220,38,38,.9); }

    /* Subtle table styles */
    table{ width:100%; }
    tbody td{ padding: 8px 6px; }
    tbody tr:hover{ background: rgba(30,64,175,.06); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>BoozClub</h1>
        <div class="sub">Monthly hosting schedule and “who’s up next”.</div>
      </div>
      <div class="row">
        <a class="btn primary" href="./admin.html">Admin</a>
        <button class="btn accent" id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <div class="grid">
      <section class="card hero">
        <div class="row" style="justify-content:space-between;">
          <div class="pill"><span class="dot" id="syncDot"></span><span id="syncText">Loading…</span></div>
          <div class="pill">Data: <strong id="dataSrc">events.json</strong></div>
        </div>

        <p class="big" id="headline">Next up: <span>—</span></p>
        <div class="row" id="statusRow" style="gap:8px"></div>

        <div class="kv" id="detailsKV"></div>

        <div class="divider"></div>

        <div class="row">
          <span class="muted" id="asof">As of —</span>
          <span class="spacer"></span>
          <span class="pill">Tip: use <strong>Admin</strong> to update hosts/dates.</span>
        </div>
      </section>

      <section class="card" id="scheduleSection">
        <div class="row" style="justify-content:space-between;">
          <h2 style="margin:0; font-size:16px;">Full Schedule</h2>
          <span class="pill"><strong id="countPill">0</strong> events</span>
        </div>
        <div style="margin-top:10px" id="scheduleMount"></div>
      </section>
    </div>

    <footer>
      <div>© <span id="year"></span> BoozClub</div>
      <div class="muted">Static site + GitHub Pages</div>
    </footer>
  </div>

  <script>
    const el = {
      headline: document.getElementById('headline'),
      statusRow: document.getElementById('statusRow'),
      detailsKV: document.getElementById('detailsKV'),
      scheduleSection: document.getElementById('scheduleSection'),
      scheduleMount: document.getElementById('scheduleMount'),
      countPill: document.getElementById('countPill'),
      asof: document.getElementById('asof'),
      syncText: document.getElementById('syncText'),
      syncDot: document.getElementById('syncDot'),
      refreshBtn: document.getElementById('refreshBtn'),
      year: document.getElementById('year'),
      dataSrc: document.getElementById('dataSrc'),
    };

    el.year.textContent = String(new Date().getFullYear());

    // --- Utilities ---
    function isoDateOnly(d){
      const dt = new Date(d);
      if(Number.isNaN(dt.getTime())) return null;
      const yyyy = dt.getFullYear();
      const mm = String(dt.getMonth()+1).padStart(2,'0');
      const dd = String(dt.getDate()).padStart(2,'0');
      return `${yyyy}-${mm}-${dd}`;
    }
    function formatDate(iso){
      const dt = new Date(iso + 'T12:00:00');
      if(Number.isNaN(dt.getTime())) return iso;
      return dt.toLocaleDateString(undefined, { weekday:'short', year:'numeric', month:'short', day:'numeric' });
    }
    function daysBetween(aIso, bIso){
      const a = new Date(aIso + 'T12:00:00');
      const b = new Date(bIso + 'T12:00:00');
      return Math.round((b - a) / (1000*60*60*24));
    }

    function classifyEvent(e){
      const hostRaw = (e.host||'').trim().toLowerCase();
      const noteRaw = (e.note||'').trim().toLowerCase();
      const isSkipped = hostRaw==='skip' || hostRaw==='skipped' || noteRaw==='skipped' || noteRaw==='skip';
      const isCancelled = hostRaw==='cancelled' || hostRaw==='canceled' || noteRaw==='cancelled' || noteRaw==='canceled';
      const rowClass = isSkipped ? 'row-skipped' : isCancelled ? 'row-cancelled' : '';
      return { isSkipped, isCancelled, rowClass };
    }

    // --- Data fetch ---
    async function fetchEvents(){
      // cache-bust to avoid stale JSON
      const url = `./events.json?v=${Date.now()}`;
      el.dataSrc.textContent = 'events.json';
      const res = await fetch(url, { cache:'no-store' });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if(!data || !Array.isArray(data.events)) throw new Error('Invalid events.json format (expected { events: [] })');
      return data.events;
    }

    function renderNext(nextEvent, todayIso){
      if(!nextEvent){
        el.headline.innerHTML = `Next up: <span>—</span>`;
        el.statusRow.innerHTML = '';
        el.detailsKV.innerHTML = `<div class="line"><span class="k">Status</span><span class="v">No upcoming dates</span></div>`;
        return;
      }
      const d = nextEvent.date;
      const days = daysBetween(todayIso, d);
      const { isSkipped, isCancelled } = classifyEvent(nextEvent);

      const badge =
        isSkipped ? `<span class="badge skipped">Skipped</span>` :
        isCancelled ? `<span class="badge cancelled">Cancelled</span>` :
        days === 0 ? `<span class="badge active">Today</span>` :
        days <= 7 ? `<span class="badge soon">Soon</span>` :
        `<span class="badge">Upcoming</span>`;

      el.headline.innerHTML = `Next up: <span>${formatDate(d)}</span>`;
      el.statusRow.innerHTML = badge;

      const hostRaw = (nextEvent.host||'').trim().toLowerCase();
      const hideHost = isSkipped || isCancelled || hostRaw==='skip' || hostRaw==='skipped' || hostRaw==='cancelled' || hostRaw==='canceled';
      const host = hideHost ? '—' : (nextEvent.host || '—');

      el.detailsKV.innerHTML = [
        `<div class="line"><span class="k">Date</span><span class="v">${formatDate(d)}</span></div>`,
        `<div class="line"><span class="k">Host</span><span class="v">${host}</span></div>`,
        `<div class="line"><span class="k">Note</span><span class="v">${nextEvent.note || '—'}</span></div>`,
      ].join('');
    }

    function renderSchedule(list){
      if(!Array.isArray(list) || !list.length){ el.scheduleSection.style.display = 'none'; return; }
      // Render newest first (without changing the underlying list ordering used elsewhere)
      const displayList = [...list].sort((a,b)=> b.date.localeCompare(a.date));
      const rows = displayList.map(e=>{
        const { isSkipped, isCancelled, rowClass } = classifyEvent(e);
        const noteCell = isSkipped
          ? `<span class="badge skipped">Skipped</span>`
          : isCancelled
          ? `<span class="badge cancelled">Cancelled</span>`
          : (e.note||'');
        const hostRaw = (e.host||'').trim().toLowerCase();
        const hideHost = isSkipped || hostRaw==='skip' || hostRaw==='skipped' || hostRaw==='cancelled' || hostRaw==='canceled';
        const hostCell = hideHost ? '—' : (e.host || '—');
        return `<tr class="${rowClass}">
          <td>${formatDate(e.date)}</td>
          <td>${hostCell}</td>
          <td>${noteCell}</td>
        </tr>`;
      }).join('');
      el.scheduleMount.innerHTML = `<div style="overflow:auto"><table style="width:100%; border-collapse:collapse">
        <thead><tr>
          <th style="text-align:left; padding:8px 6px; border-bottom:1px solid rgba(148,163,184,.35)">Date</th>
          <th style="text-align:left; padding:8px 6px; border-bottom:1px solid rgba(148,163,184,.35)">Host</th>
          <th style="text-align:left; padding:8px 6px; border-bottom:1px solid rgba(148,163,184,.35)">Note</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
      el.scheduleSection.style.display = '';
    }

    // --- UI helpers ---
    function setStatus(text, tone){
      el.syncText.textContent = text;
      el.syncDot.classList.remove('ok','bad');
      if(tone==='ok') el.syncDot.classList.add('ok');
      if(tone==='bad') el.syncDot.classList.add('bad');
    }

    // --- Main load ---
    async function load(){
      try{
        setStatus('Syncing…');
        const events = await fetchEvents();
        const todayIso = isoDateOnly(new Date());
        const norm = events
          .map(e=>({ date: isoDateOnly(e.date) || '', host: e.host || '', note: e.note || '' }))
          .filter(e=>e.date)
          .sort((a,b)=> a.date.localeCompare(b.date));

        el.countPill.textContent = String(norm.length);
        el.asof.textContent = `As of ${new Date().toLocaleString()}`;

        // Find next upcoming (today or future) using ascending list
        const next = norm.find(e => e.date >= todayIso);

        renderNext(next, todayIso);
        renderSchedule(norm);

        setStatus('Up to date', 'ok');
      }catch(err){
        console.error(err);
        setStatus('Sync failed', 'bad');
        el.headline.innerHTML = `Next up: <span>—</span>`;
        el.detailsKV.innerHTML = `<div class="line"><span class="k">Error</span><span class="v">${String(err.message || err)}</span></div>`;
        el.scheduleSection.style.display = 'none';
      }
    }

    el.refreshBtn.addEventListener('click', load);
    load();
  </script>
</body>
</html>
